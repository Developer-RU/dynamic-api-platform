apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dap
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
    spec:
      initContainers:
        - name: wait-mongo-replica
          image: mongo:7
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -ec
            - |
              uri="mongodb://mongo-0.mongo-headless:27017,mongo-1.mongo-headless:27017,mongo-2.mongo-headless:27017/dynamic_api?replicaSet=rs0"
              for i in $(seq 1 90); do
                if mongosh "$uri" --quiet --eval '
                  const s = rs.status();
                  if (s.ok && s.members.some(m => m.stateStr === "PRIMARY")) quit(0);
                  quit(1);
                '; then
                  echo "MongoDB replica set ready"
                  exit 0
                fi
                echo "Waiting for PRIMARY ($i/90)..."
                sleep 5
              done
              echo "Timeout waiting for MongoDB replica set"
              exit 1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      containers:
        - name: backend
          image: dap/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
