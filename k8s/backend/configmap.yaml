apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: dap
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
data:
  NODE_ENV: production
  PORT: "3001"
  MONGODB_URI: mongodb://mongo-0.mongo-headless:27017,mongo-1.mongo-headless:27017,mongo-2.mongo-headless:27017/dynamic_api?replicaSet=rs0
  JWT_EXPIRES_IN: 15m
  JWT_REFRESH_EXPIRES_IN: 7d
  CORS_ORIGIN: http://localhost
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "1000"
  ADMIN_LOGIN: admin
  ADMIN_EMAIL: admin@dynamic-api.local
