# Copy to secrets.yaml, replace values, then: kubectl apply -f k8s/backend/secrets.yaml
# Do NOT commit secrets.yaml with real production credentials.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: dap
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
type: Opaque
stringData:
  JWT_SECRET: change-me-to-a-long-random-string
  JWT_REFRESH_SECRET: change-me-to-another-long-random-string
  CSRF_SECRET: change-me-csrf-secret
  ADMIN_PASSWORD: Admin123!
