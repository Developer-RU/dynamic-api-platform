apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dap
  namespace: dap
  labels:
    app.kubernetes.io/name: dynamic-api-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: dap.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
