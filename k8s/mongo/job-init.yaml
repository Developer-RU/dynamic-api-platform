# One-shot Job: configures MongoDB replica set rs0.
# Idempotent — safe to re-run if already initialized.
apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-init
  namespace: dap
  labels:
    app.kubernetes.io/name: mongo
    app.kubernetes.io/component: database-init
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongo-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: mongo:7
          imagePullPolicy: IfNotPresent
          command: ["bash", "/scripts/replica-init.sh"]
          env:
            - name: MONGO_REPLICA_SET_ID
              value: rs0
            - name: MONGO_PRIMARY_HOST
              value: mongo-0.mongo-headless:27017
            - name: MONGO_MEMBER2_HOST
              value: mongo-1.mongo-headless:27017
            - name: MONGO_MEMBER3_HOST
              value: mongo-2.mongo-headless:27017
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: mongo-init-scripts
            defaultMode: 0755
