# =============================================================================
# Dynamic API Platform — MongoDB Replica Set (3 nodes)
#
# Usage:
#   docker compose -f docker-compose.replica.yml up -d --build
#   docker compose -f docker-compose.replica.yml ps
#
# Docs: docs/mongodb-replica-set.md
# =============================================================================

name: dap-replica

services:
  mongo1:
    image: mongo:7
    container_name: dap-mongo1
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    networks:
      - replica-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo2:
    image: mongo:7
    container_name: dap-mongo2
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db
    networks:
      - replica-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo3:
    image: mongo:7
    container_name: dap-mongo3
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27019:27017"
    volumes:
      - mongo3_data:/data/db
    networks:
      - replica-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-init:
    image: mongo:7
    container_name: dap-mongo-init
    restart: "no"
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    volumes:
      - ./docker/mongo/replica-init.sh:/replica-init.sh:ro
    entrypoint: ["bash", "/replica-init.sh"]
    networks:
      - replica-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dap-backend-replica
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://mongo1:27017,mongo2:27017,mongo3:27017/dynamic_api?replicaSet=rs0
      JWT_SECRET: ${JWT_SECRET:-dap-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dap-super-secret-refresh-key-change-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:8080
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 1000
      CSRF_SECRET: ${CSRF_SECRET:-dap-csrf-secret-change-in-production}
      ADMIN_EMAIL: admin@dynamic-api.local
      ADMIN_PASSWORD: Admin123!
      ADMIN_LOGIN: admin
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    volumes:
      - backend_logs:/app/logs
    networks:
      - replica-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: dap-frontend-replica
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - replica-network

networks:
  replica-network:
    name: dap-replica-network
    driver: bridge

volumes:
  mongo1_data:
    name: dap_mongo1_data
  mongo2_data:
    name: dap_mongo2_data
  mongo3_data:
    name: dap_mongo3_data
  backend_logs:
    name: dap_backend_logs_replica
